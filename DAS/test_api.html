<!DOCTYPE html>
<html>

<head>
    <title>Test Approval API</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .response {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>
    <h1>DAS Approval API Test</h1>

    <button onclick="testApproval()">Test Approve Profile #5</button>
    <button onclick="testSubmit()">Test Submit Profile #4</button>

    <div id="result"></div>

    <script>
        function testApproval() {
            const formData = new FormData();
            formData.append('action', 'approve_profile');
            formData.append('profile_id', '5');
            formData.append('remarks', 'Test approval from browser');

            document.getElementById('result').innerHTML = '<div class="response">Sending request...</div>';

            fetch('modules/api/customer_api.php', {
                method: 'POST',
                body: formData
            })
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    return response.text();
                })
                .then(text => {
                    console.log('Raw response:', text);

                    let html = '<div class="response"><h3>Raw Response:</h3><pre>' + escapeHtml(text) + '</pre></div>';

                    try {
                        const json = JSON.parse(text);
                        html += '<div class="response success"><h3>Parsed JSON:</h3><pre>' + JSON.stringify(json, null, 2) + '</pre></div>';
                    } catch (e) {
                        html += '<div class="response error"><h3>JSON Parse Error:</h3><pre>' + e.message + '</pre></div>';
                        html += '<div class="response error"><h3>First 500 chars:</h3><pre>' + escapeHtml(text.substring(0, 500)) + '</pre></div>';
                    }

                    document.getElementById('result').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = '<div class="response error"><h3>Fetch Error:</h3><pre>' + error.message + '</pre></div>';
                });
        }

        function testSubmit() {
            const formData = new FormData();
            formData.append('action', 'submit_profile');
            formData.append('profile_id', '4');
            formData.append('remarks', 'Test submission from browser');

            document.getElementById('result').innerHTML = '<div class="response">Sending request...</div>';

            fetch('modules/api/customer_api.php', {
                method: 'POST',
                body: formData
            })
                .then(response => response.text())
                .then(text => {
                    console.log('Raw response:', text);

                    let html = '<div class="response"><h3>Raw Response:</h3><pre>' + escapeHtml(text) + '</pre></div>';

                    try {
                        const json = JSON.parse(text);
                        html += '<div class="response success"><h3>Parsed JSON:</h3><pre>' + JSON.stringify(json, null, 2) + '</pre></div>';
                    } catch (e) {
                        html += '<div class="response error"><h3>JSON Parse Error:</h3><pre>' + e.message + '</pre></div>';
                    }

                    document.getElementById('result').innerHTML = html;
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = '<div class="response error"><h3>Fetch Error:</h3><pre>' + error.message + '</pre></div>';
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
